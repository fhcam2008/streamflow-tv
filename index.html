<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>StreamFlow TV</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#060a10;color:#f0e8d8;font-family:Arial,sans-serif;overflow:hidden;}
#info{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#111820;border:2px solid #e8c96d;border-radius:12px;padding:30px 40px;text-align:center;min-width:400px;}
h1{font-size:22px;color:#e8c96d;margin-bottom:20px;letter-spacing:2px;}
#keyLog{font-size:28px;font-weight:700;color:#5bc4e8;margin:10px 0;}
#keyCode{font-size:16px;color:#8a9db8;margin-bottom:20px;}
#history{font-size:13px;color:#374455;max-height:200px;overflow-y:auto;text-align:left;border-top:1px solid #18222e;padding-top:10px;margin-top:10px;}
#hint{font-size:14px;color:#8a9db8;margin-top:16px;}
</style>
</head>
<body>
<div id="info">
  <h1>TUŞ TESTI</h1>
  <div id="keyLog">Bir tuşa basın...</div>
  <div id="keyCode">keyCode: —</div>
  <div id="history"></div>
  <div id="hint">Uzaktan kumandada ok tuşlarına ve diğer tuşlara basın</div>
</div>
<script>
const log=document.getElementById('keyLog');
const kc=document.getElementById('keyCode');
const hist=document.getElementById('history');
const names={37:'SOL',38:'YUKARI',39:'SAĞ',40:'AŞAĞI',13:'ENTER',10009:'BACK',403:'KIRMIZI',404:'YEŞİL',405:'SARI',406:'MAVİ',427:'CH+',428:'CH-',415:'PLAY',19:'PAUSE',413:'STOP',449:'MUTE',457:'INFO'};
document.addEventListener('keydown',function(e){
  const n=names[e.keyCode]||e.key||'?';
  log.textContent=n;
  kc.textContent='keyCode: '+e.keyCode+' | key: "'+e.key+'" | code: "'+e.code+'"';
  const row=document.createElement('div');
  row.textContent=(new Date().toLocaleTimeString())+' → keyCode:'+e.keyCode+' key:"'+e.key+'"';
  hist.insertBefore(row,hist.firstChild);
  e.preventDefault();
});
</script>
</body>
</html>
